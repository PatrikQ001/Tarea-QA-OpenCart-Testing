name: OpenCart E2E

on:
  push:
  pull_request:

jobs:
  opencart:
    runs-on: ubuntu-latest
 
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: opencart
          MYSQL_USER: opencart
          MYSQL_PASSWORD: opencart
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mysqli, gd, curl, mbstring, zip, openssl
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Wait for MySQL
        run: |
          until mysql -h 127.0.0.1 -uopencart -popencart -e "SELECT 1" > /dev/null 2>&1; do
            echo "Esperando MySQL..."
            sleep 3
          done

      - name: Create storage directories
        run: |
          mkdir -p upload/system/storage/cache
          mkdir -p upload/system/storage/logs
          mkdir -p upload/system/storage/session
          mkdir -p upload/system/storage/upload
          mkdir -p upload/system/storage/download
          mkdir -p upload/system/storage/modification

      - name: Prepare config files
        run: |
          cp upload/config-dist.php upload/config.php
          cp upload/admin/config-dist.php upload/admin/config.php
          chmod 666 upload/config.php
          chmod 666 upload/admin/config.php

      - name: Start PHP server
        run: |
          php -S 127.0.0.1:8000 -t upload > /tmp/php-server.log 2>&1 &
          sleep 5

      - name: Install OpenCart
        run: |
          php upload/install/cli_install.php install \
            --username admin \
            --password admin123 \
            --email admin@example.com \
            --http_server http://127.0.0.1:8000/ \
            --language en-gb \
            --db_driver mysqli \
            --db_hostname 127.0.0.1 \
            --db_username opencart \
            --db_password opencart \
            --db_database opencart \
            --db_port 3306 \
            --db_prefix oc_

      - name: Smoke test local frontend
        run: |
          curl -I http://127.0.0.1:8000
          curl -L http://127.0.0.1:8000 | head -n 20

      - name: Smoke test local admin
        run: |
          curl -I http://127.0.0.1:8000/admin/

      - name: Create temporary public link
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
          chmod +x cloudflared
          ./cloudflared tunnel --url http://127.0.0.1:8000 --no-autoupdate > /tmp/cloudflared.log 2>&1 &
          sleep 20
          echo "===== CLOUDFLARED LOG ====="
          cat /tmp/cloudflared.log
          echo "==========================="

      - name: Get public URL
        run: |
          TUNNEL_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' /tmp/cloudflared.log | head -n 1)
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
          echo "URL pública detectada: $TUNNEL_URL"

      - name: Update config files with public URL
        run: |
          sed -i "s|http://127.0.0.1:8000/|${TUNNEL_URL}/|g" upload/config.php
          sed -i "s|http://127.0.0.1:8000/|${TUNNEL_URL}/|g" upload/admin/config.php

      - name: Update database URLs
        run: |
          mysql -h 127.0.0.1 -uopencart -popencart opencart -e "
            UPDATE oc_setting SET value='${TUNNEL_URL}/' WHERE \`key\`='config_url';
            UPDATE oc_setting SET value='${TUNNEL_URL}/' WHERE \`key\`='config_ssl';
          "

      - name: Smoke test public frontend
        run: |
          echo "Frontend público: ${TUNNEL_URL}"
          curl -I ${TUNNEL_URL}
          curl -L ${TUNNEL_URL} | head -n 30

      - name: Smoke test public admin
        run: |
          curl -I ${TUNNEL_URL}/admin/

      - name: Keep server alive temporarily
        run: sleep 900

      - name: Show cloudflared log if failed
        if: failure()
        run: cat /tmp/cloudflared.log

      - name: Show PHP server logs if failed
        if: failure()
        run: cat /tmp/php-server.log
